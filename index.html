<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <h1>🚀 AI Resume Analyzer</h1>
    <button onclick="toggleMode()" id="modeBtn">🌙</button>
  </div>

  <!-- Upload -->
  <div class="upload-box">
    <input type="file" id="fileInput" accept="application/pdf">
    <p>Upload Resume (PDF)</p>
  </div>

  <!-- Job Description -->
  <textarea id="jobDesc" placeholder="Paste Job Description here..." rows="5"></textarea>

  <button class="analyze-btn" onclick="handleUpload()">Analyze Resume</button>

  <div id="loader" class="hidden">🔍 Analyzing...</div>

  <!-- PDF Preview -->
  <canvas id="pdfPreview"></canvas>

  <!-- RESULT -->
  <div id="result" class="hidden">

    <div class="card">
      <h3>ATS Score</h3>
      <div class="circle" id="atsCircle">
        <span id="atsText">0%</span>
      </div>
      <p id="matchText"></p>
    </div>

    <div class="card">
      <h3>Job Match Score</h3>
      <div class="circle" id="jobCircle">
        <span id="jobText">0%</span>
      </div>
    </div>

    <button onclick="downloadReport()">📄 Download Report</button>

    <h3>Section Analysis</h3>

    <div class="bar-box">Skills
      <div class="bar"><div id="skillBar"></div></div>
    </div>

    <div class="bar-box">Experience
      <div class="bar"><div id="expBar"></div></div>
    </div>

    <div class="bar-box">Projects
      <div class="bar"><div id="projBar"></div></div>
    </div>

    <h3>AI Suggestions</h3>
    <ul id="aiFeedback"></ul>

    <h3>Missing Keywords</h3>
    <div id="missing"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
